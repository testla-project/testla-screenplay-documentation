<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testla Screenplay – Terminal Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    .term {
      background: #0d1117;
      border-radius: 10px;
      overflow: hidden;
      width: 100%;
    }

    .term-bar {
      background: #1c1f26;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .term-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .term-label {
      margin-left: 8px;
      font-size: 12px;
      color: #6e7681;
    }

    .term-body {
      padding: 18px 20px;
      min-height: 320px;
      color: #c9d1d9;
    }

    .line { display: block; white-space: pre; }
    .c-green  { color: #3fb950; }
    .c-blue   { color: #58a6ff; }
    .c-yellow { color: #d29922; }
    .c-gray   { color: #6e7681; }
    .c-white  { color: #f0f6fc; }
    .c-cyan   { color: #39c5cf; }
    .c-purple { color: #bc8cff; }
    .c-orange { color: #f0883e; }
    .prompt   { color: #3fb950; }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: #58a6ff;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .btn-replay {
      display: none;
      margin-top: 10px;
      font-size: 12px;
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
    }

    .btn-replay:hover { background: #161b22; }
  </style>
</head>
<body>
  <div class="term">
    <div class="term-bar">
      <div class="term-dot" style="background:#ff5f56"></div>
      <div class="term-dot" style="background:#ffbd2e"></div>
      <div class="term-dot" style="background:#27c93f"></div>
      <span class="term-label">zsh — 80×24</span>
    </div>
    <div class="term-body" id="term-body"></div>
  </div>
  <button class="btn-replay" id="btn-replay" onclick="startAnimation()">↺ Replay</button>

  <script>
    const body = document.getElementById('term-body');
    const replayBtn = document.getElementById('btn-replay');

    const frames = [
      {delay:400,  html:'<span class="line"><span class="prompt">❯</span> <span class="c-white">npm init @testla/screenplay</span></span>'},
      {delay:700,  html:'<span class="line c-gray"></span>'},
      {delay:200,  html:'<span class="line"><span class="c-cyan">🧪 Welcome to testla-screenplay init</span></span>'},
      {delay:500,  html:'<span class="line c-gray"></span>'},

      {delay:400,  html:'<span class="line"><span class="c-blue">?</span> <span class="c-white">Name of your tests folder:</span> <span class="c-yellow">tests</span></span>'},
      {delay:400,  html:'<span class="line"><span class="c-blue">?</span> <span class="c-white">Base URL of the application under test?</span> <span class="c-yellow">https://your-amazing-app-url.com</span></span>'},
      {delay:400,  html:'<span class="line"><span class="c-blue">?</span> <span class="c-white">Which browser do you want to use?</span> <span class="c-yellow">chromium</span></span>'},
      {delay:400,  html:'<span class="line"><span class="c-blue">?</span> <span class="c-white">Should tests run in headless mode?</span> <span class="c-yellow">Yes</span></span>'},
      {delay:400,  html:'<span class="line"><span class="c-blue">?</span> <span class="c-white">Will you interact with AWS services?</span> <span class="c-yellow">No</span></span>'},
      {delay:400,  html:'<span class="line"><span class="c-blue">?</span> <span class="c-white">Which reporter do you want to use?</span> <span class="c-yellow">screenplay:html</span></span>'},
      {delay:600,  html:'<span class="line c-gray"></span>'},

      {delay:200,  html:'<span class="line"><span class="c-orange">🚀 Initializing Testla Screenplay project (npm init -y)...</span></span>'},
      {delay:1200, html:'<span class="line c-gray"></span>'},

      {delay:200,  html:'<span class="line"><span class="c-green">✔ Success! Created a Testla Screenplay project</span></span>'},
      {delay:300,  html:'<span class="line c-gray"></span>'},
      {delay:200,  html:'<span class="line"><span class="c-purple">✨ Happy hacking! 🎭</span></span>'},
      {delay:300,  html:'<span class="line c-gray"></span>'},
      {delay:100,  html:'<span class="line"><span class="prompt">❯</span> <span class="cursor"></span></span>'},
    ];

    let timeouts = [];

    function clearAll() {
      timeouts.forEach(clearTimeout);
      timeouts = [];
      body.innerHTML = '';
      replayBtn.style.display = 'none';
    }

    function startAnimation() {
      clearAll();
      let t = 200;
      frames.forEach((f, i) => {
        t += f.delay;
        const id = setTimeout(() => {
          body.innerHTML += f.html;
          if (i === frames.length - 1) replayBtn.style.display = 'inline-block';
        }, t);
        timeouts.push(id);
      });
    }

    startAnimation();
  </script>
</body>
</html>
