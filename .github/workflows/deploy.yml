name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Verhindert parallele Deployments, wartende Jobs werden abgebrochen
concurrency:
  group: pages-production
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4