name: PR Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

# Verhindert Race-Conditions bei schnell aufeinanderfolgenden Pushes
concurrency:
  group: pages-preview-pr-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: write        # Schreibt auf den gh-pages Branch
  pull-requests: write   # Kommentiert im PR

jobs:
  preview:
    name: Preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
        # Build nur wenn PR geöffnet/aktualisiert, nicht beim Schließen
        if: github.event.action != 'closed'

      - name: Install dependencies
        run: npm ci
        if: github.event.action != 'closed'

      - name: Build Docusaurus (Preview)
        run: npm run build

      - name: Deploy / Remove Preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: build/
          # Optionale Anpassungen:
          # preview-branch: gh-pages   # Ziel-Branch (Standard: gh-pages)
          # umbrella-dir: pr-preview   # Ordner im Branch (Standard: pr-preview)
          # token: ${{ secrets.GITHUB_TOKEN }}