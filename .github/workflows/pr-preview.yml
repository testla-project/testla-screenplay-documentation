name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: pages-preview-pr-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    name: Preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
        if: github.event.action != 'closed'

      - name: Install dependencies
        run: npm ci
        if: github.event.action != 'closed'

      - name: Build Docusaurus (Preview)
        run: npm run build
        if: github.event.action != 'closed'
        env:
          # Deine Ziel-URL
          DEPLOY_URL: https://testla-project.github.io
          # Der Pfad für die PR-Vorschau (OHNE Repo-Namen, falls die Domain direkt darauf zeigt)
          BASE_URL: /testla-screenplay-documentation/

      - name: Deploy / Remove Preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: build/
          # Die Action erkennt automatisch, ob gelöscht (PR closed) oder hochgeladen werden muss.